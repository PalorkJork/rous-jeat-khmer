<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Khmer Taste</title>

    <link
        rel="icon"
        type="image/png"
        href="../../assets/images/branding/favicon.png"
    >

    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/forms.css">
    <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>
<body>

    <header class="header">
        <div class="container navbar">
            <a href="../index.html" class="logo">
                រសជាតិខ្មែរ
            </a>

            <nav>
                <ul class="nav-links">
                    <li>
                        <a href="../index.html">
                            Home
                        </a>
                    </li>

                    <li>
                        <a href="../general/about.html">
                            About
                        </a>
                    </li>

                    <li>
                        <a href="../menu/menu.html">
                            Menu
                        </a>
                    </li>

                    <li>
                        <a href="../services/services.html">
                            Services
                        </a>
                    </li>

                    <li>
                        <a href="../general/gallery.html">
                            Gallery
                        </a>
                    </li>

                    <li>
                        <a href="../general/contact.html">
                            Contact
                        </a>
                    </li>

                    <li>
                        <a href="../account/login.html">
                            Login
                        </a>
                    </li>

                    <li>
                        <a
                            href="../account/register.html"
                            class="btn"
                        >
                            Register
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="account-section">
            <div class="account-card">
                <h1>
                    Login
                </h1>

                <p class="account-subtitle">
                    ចូលគណនីរបស់អ្នក
                </p>

                <form action="#" method="post">
                    <div class="form-group">
                        <label for="email">
                            Email Address
                        </label>

                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="example@email.com"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">
                            Password
                        </label>

                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Enter your password"
                            required
                        >
                    </div>

                    <div class="remember-row">
                        <div class="remember-option">
                            <input
                                type="checkbox"
                                id="remember"
                                name="remember"
                            >

                            <label for="remember">
                                Remember me
                            </label>
                        </div>

                        <a
                            href="#"
                            class="forgot-link"
                        >
                            Forgot password?
                        </a>
                    </div>

                    <button type="submit" class="btn">
                        Login
                    </button>

                    <p class="account-link">
                        Do not have an account?

                        <a href="register.html">
                            Register here
                        </a>
                    </p>
                </form>
            </div>
        </section>
    </main>

    <script>
        const form = document.querySelector("form");

        form.addEventListener("submit", function(e) {
            e.preventDefault();

            const email =
                document.getElementById("email").value;

            const password =
                document.getElementById("password").value;

            const users = JSON.parse(localStorage.getItem("users")) || [];

            const user = users.find(
                u => u.email === email && u.password === password
            );

            if (user) {

                localStorage.setItem("loggedIn", "true");

                // Save the current logged in user
                localStorage.setItem("currentUser", JSON.stringify(user));

                window.location.href = "../index.html";

            } else {

                alert("Invalid email or password.");

            }
        });
    </script>

</body>
</html>
